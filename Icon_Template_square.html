<!DOCTYPE html>
<html>
    
    <head>
        <head>
  <style>
    img {
      width: 200px;
      transition: transform 0.25s ease, filter 0.25s ease;
      cursor: pointer;
      }

    img:hover {
      transform: scale(1.15);
      filter: brightness(1.25) drop-shadow(0 0 10px #60a5fa);
    }

    img.active {
      transform: scale(0.9);
      filter: brightness(1.5) drop-shadow(0 0 15px #93c5fd);
    }
    
  </style>
</head>
    <title>Icon Template Square</title>
        
        <script src="https://cdnjs.cloudflare.com/ajax/libs/buzz/1.2.0/buzz.min.js"></script>
        
        <style>
            .row{
                width:720px;
                margin: 10px auto 10px auto ;
            }
            .image-container {
                display: table-cell;
                vertical-align: middle;
                padding:20px;
            }
        </style>
    </head>

    <body>

        <div class="row">
            <div class="image-container"><img id="img1" src="img/camera.png" height="200" width="200"/></div>
            <div class="image-container"><img id="img2" src="img/window-.png" height="200" width="200"/></div>
            <div class="image-container"><img id="img3" src="img/light.png" height="200" width="200"/></div>
        </div>

        <div class="row">
            <div class="image-container"><img id="img4" src="img/Lock.png" height="200" width="200"/></div>
            <div class="image-container"><img id="img5" src="img/power.png" height="200" width="200"/></div>
            <div class="image-container"><img id="img6" src="img/smart-home.png" height="200" width="200"/></div>
            </div>

        <div class="row">
            <div class="image-container"><img id="img7" src="img/speaker.png" height="200" width="200"/></div>
            <div class="image-container"><img id="img8" src="img/thermometer-.png" height="200" width="200"/></div>
            <div class="image-container"><img id="img9" src="img/wi-fi-svg.png" height="200" width="200"/></div>
        </div>
        
        <script>
            var sound1 = new buzz.sound("sound/camera.mp3");
            var sound2 = new buzz.sound("sound/window.mp3");
            var sound3 = new buzz.sound("sound/light.mp3");
            var sound4 = new buzz.sound("sound/lock.mp3");
            var sound5 = new buzz.sound("sound/power.mp3");
            var sound6 = new buzz.sound("sound/smart home.mp3");
            var sound7 = new buzz.sound("sound/speake.mp3");
            var sound8 = new buzz.sound("sound/temp_1.mp3"); 
            var sound9 = new buzz.sound("sound/wifi.mp3");
     
            window.onload = function() {
                document.getElementById('img1').addEventListener('click', function () {sound1.play(); });  
                document.getElementById('img2').addEventListener('click', function () {sound2.play(); });
                document.getElementById('img3').addEventListener('click', function () {sound3.play(); });
                document.getElementById('img4').addEventListener('click', function () {sound4.play(); });
                document.getElementById('img5').addEventListener('click', function () {sound5.play(); }); 
                document.getElementById('img6').addEventListener('click', function () {sound6.play(); }); 
                document.getElementById('img7').addEventListener('click', function () {sound7.play(); }); 
                document.getElementById('img8').addEventListener('click', function () {sound8.play(); }); 
                document.getElementById('img9').addEventListener('click', function () {sound9.play(); });
            }  
            
</script>
        </script>   
        
    </body>
    <script>

</script>
    
</html>
